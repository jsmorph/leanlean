name = "LeanLean"
version = "0.1.0"
defaultTargets = ["leanlean"]

[[lean_lib]]
name = "LeanLean"

[[lean_lib]]
name = "MPC"

[[lean_lib]]
name = "Faithfulness.Accepted"

[[lean_lib]]
name = "Faithfulness.ModuleA"

[[lean_lib]]
name = "Faithfulness.ModuleB"

[[lean_lib]]
name = "Faithfulness.Fragments"

[[lean_lib]]
name = "Faithfulness.ExportSmoke"

[[lean_lib]]
name = "Faithfulness.ExportArithmetic"

[[lean_lib]]
name = "Faithfulness.ExportOmega"

[[lean_lib]]
name = "Faithfulness.UnsupportedModule"

[[lean_lib]]
name = "Faithfulness.Arena.Bogus1"

[[lean_lib]]
name = "Faithfulness.Arena.ProjOfProp"

[[lean_exe]]
name = "leanlean"
root = "Main"

[[lean_exe]]
name = "leanleantest"
root = "Test"

[[lean_exe]]
name = "leanleanfaith"
root = "Faithfulness.Runner"

[[lean_exe]]
name = "leanleanimport"
root = "Faithfulness.ImportSmoke"

[[lean_exe]]
name = "leanleandiff"
root = "Faithfulness.Differential"

[[lean_exe]]
name = "leanlean-check-module"
root = "CheckModule"
supportInterpreter = true

[[lean_exe]]
name = "leanlean-check-export"
root = "CheckExport"

[[lean_exe]]
name = "mpc-check-export"
root = "CheckMPCExport"

[[lean_exe]]
name = "leanlean-export-roots"
root = "ExportRoots"
supportInterpreter = true

[[lean_exe]]
name = "leanlean-self-check"
root = "SelfCheck"
supportInterpreter = true

[[lean_exe]]
name = "mpctest"
root = "MPCTest"
