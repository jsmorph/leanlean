name = "MPC"
version = "0.1.0"
defaultTargets = ["mpc-check-export"]

[[lean_lib]]
name = "MPC"

[[lean_lib]]
name = "MPCFixtures.ExportArithmetic"

[[lean_lib]]
name = "MPCFixtures.ExportOmega"

[[lean_lib]]
name = "MPCFixtures.ExportNestedIndexed"

[[lean_lib]]
name = "MPCFixtures.ExportMutual"

[[lean_exe]]
name = "mpc-check-export"
root = "CheckMPCExport"

[[lean_exe]]
name = "mpc-export-roots"
root = "ExportRoots"
supportInterpreter = true

[[lean_exe]]
name = "mpc-migrate-layer"
root = "MigrateLayer"

[[lean_exe]]
name = "mpc-dynamic-profile-export"
root = "DynamicProfileExport"

[[lean_exe]]
name = "mpctest"
root = "MPCTest"
